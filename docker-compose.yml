services:
  db:
    image: postgres:18.3-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - POSTGRES_DB=${PGDATABASE}
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_secret
    secrets:
      - db_secret
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER} -d ${PGDATABASE} -h localhost -p ${PGPORT}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: 
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 128M
    environment:
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT}
      - PGDATABASE=${PGDATABASE}
      - PGUSER=${PGUSER}
      - PGPASSWORD_FILE=/run/secrets/db_secret
    secrets:
      - db_secret
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/time"]
      interval: 10s
      retries: 3

  frontend:
    build: 
      context: ./front
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          memory: 64M
    ports:
      - "80:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - frontend
      - backend
    volumes:
      - ./front/nginx_data/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080"]
      interval: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  docker-proxy:
    image: tecnativa/docker-socket-proxy
    restart: unless-stopped
    privileged: false
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 64M
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - LOGS=1
      - VERSION=1
      - PING=1
      - EVENTS=1
      - INFO=1
      - LIST_NETWORKS=0
      - NODES=0
      - SERVICES=0
      - TASKS=0
      - VOLUMES=0
      - NETWORKS=0
    networks:
      - monitoring
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run
      - /tmp
      - /var/cache/haproxy
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2375"]
      interval: 5s
      timeout: 5s
      retries: 5

  dozzle:
    image: amir20/dozzle:latest
    restart: unless-stopped
    depends_on:
      docker-proxy:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 256M
    networks:
      - monitoring
      - frontend
    ports:
      - "8888:8080"
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
      - DOZZLE_LEVEL=info
      - DOZZLE_ENABLE_ACTIONS=true
      - DOZZLE_NO_ANALYTICS=true
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  db_data:

secrets:
  db_secret:
    file: ./secrets/db_secret.txt

networks:
  backend:
    internal: true
  frontend:
  monitoring:
    internal: true